<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}Сайт{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<header>
  <a href="{{ url_for('index') }}" class="logo">LOGO</a>
  <nav>
    {% if session.uid %}
      {% if session.is_admin %}<a href="{{ url_for('admin') }}">Админ</a>
      {% else %}<a href="{{ url_for('cabinet') }}">Кабинет</a>{% endif %}
      <span class="email">{{ session.nickname }}</span>
      <a href="{{ url_for('logout') }}" class="btn">Выйти</a>
    {% else %}
      <a href="{{ url_for('login') }}" class="btn">Вход</a>
      <a href="{{ url_for('register') }}" class="btn btn-primary">Регистрация</a>
    {% endif %}
  </nav>
</header>
<main>
  {% with msgs = get_flashed_messages() %}
    {% for m in msgs %}<div class="flash">{{ m }}</div>{% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
</body>
</html>
